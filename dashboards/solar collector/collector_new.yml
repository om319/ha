type: grid
columns: 1
cards:
  - type: custom:button-card
    name: ☀️ Solar Collector System
    styles:
      card:
        - background-color: '#ff9800'
        - color: white
        - font-size: 18px
        - font-weight: bold
        - padding: 12px
        - border-radius: 12px
      name:
        - color: white
    tap_action:
      action: none

  # STATUS OVERVIEW
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        entity: sensor.solar_system_status
        name: System Status
        show_state: true
        icon: |
          [[[
            if (entity.state.includes('ON')) return 'mdi:pump';
            if (entity.state.includes('Disabled')) return 'mdi:power-off';
            if (entity.state.includes('Manual')) return 'mdi:hand-back-right';
            return 'mdi:pump-off';
          ]]]
        styles:
          card:
            - padding: 12px
            - border-radius: 10px
            - background: |
                [[[
                  if (entity.state.includes('ON')) return 'linear-gradient(135deg, #4caf50 0%, #81c784 100%)';
                  if (entity.state.includes('Disabled')) return 'linear-gradient(135deg, #f44336 0%, #e57373 100%)';
                  if (entity.state.includes('Manual')) return 'linear-gradient(135deg, #ff9800 0%, #ffb74d 100%)';
                  return 'linear-gradient(135deg, #2196f3 0%, #64b5f6 100%)';
                ]]]
          name:
            - font-size: 11px
            - color: white
          state:
            - font-size: 13px
            - font-weight: bold
            - color: white
          icon:
            - color: white
            - width: 30px

      - type: custom:button-card
        entity: counter.solar_pump_on_counter
        name: Cycles Today
        show_state: true
        icon: mdi:counter
        styles:
          card:
            - padding: 12px
            - border-radius: 10px
            - background-color: '#9c27b0'
          name:
            - font-size: 11px
            - color: white
          state:
            - font-size: 20px
            - font-weight: bold
            - color: white
          icon:
            - color: white
            - width: 30px
        tap_action:
          action: none

  # TEMPERATURE CARDS - TOP SECTION
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        entity: sensor.solar_collector_temp_clean
        name: Collector
        show_state: true
        show_label: true
        icon: mdi:solar-panel
        label: |
          [[[
            var threshold = parseFloat(states['input_boolean.solar_collector_summer_mode'].state === 'on'
              ? states['input_number.solar_summer_collector_threshold'].state
              : states['input_number.solar_winter_collector_threshold'].state);
            return `Min: ${threshold}°C`;
          ]]]
        styles:
          card:
            - padding: 15px
            - border-radius: 12px
            - background: |
                [[[
                  var temp = parseFloat(entity.state);
                  if (temp >= 80) return 'linear-gradient(135deg, #ff5722 0%, #ff7043 100%)';
                  if (temp >= 55) return 'linear-gradient(135deg, #ff9800 0%, #ffb74d 100%)';
                  if (temp >= 30) return 'linear-gradient(135deg, #ffc107 0%, #ffd54f 100%)';
                  return 'linear-gradient(135deg, #607d8b 0%, #90a4ae 100%)';
                ]]]
          name:
            - font-size: 11px
            - color: white
            - font-weight: bold
          state:
            - font-size: 24px
            - font-weight: bold
            - color: white
          label:
            - font-size: 9px
            - color: rgba(255,255,255,0.8)
            - margin-top: 2px
          icon:
            - color: white
            - width: 35px
        tap_action:
          action: more-info

      - type: custom:button-card
        entity: input_boolean.solar_collector_summer_mode
        name: |
          [[[
            return states['input_boolean.solar_collector_summer_mode'].state === 'on'
              ? 'Boiler (Summer)'
              : 'Radiator (Winter)';
          ]]]
        show_state: true
        show_label: true
        icon: mdi:water-boiler
        state_display: |
          [[[
            var isSummer = states['input_boolean.solar_collector_summer_mode'].state === 'on';
            var temp = parseFloat(isSummer
              ? states['sensor.solar_collector_wifi_boiler_temperature'].state
              : states['sensor.sonoff_10021e4b3c_temperature'].state);
            return temp.toFixed(1) + '°C';
          ]]]
        label: |
          [[[
            var max = parseFloat(states['input_number.solar_max_boiler_temp'].state);
            return `Max: ${max}°C`;
          ]]]
        styles:
          card:
            - padding: 15px
            - border-radius: 12px
            - background: |
                [[[
                  var isSummer = states['input_boolean.solar_collector_summer_mode'].state === 'on';
                  var temp = parseFloat(isSummer
                    ? states['sensor.solar_collector_wifi_boiler_temperature'].state
                    : states['sensor.sonoff_10021e4b3c_temperature'].state);
                  if (temp >= 80) return 'linear-gradient(135deg, #d32f2f 0%, #f44336 100%)';
                  if (temp >= 55) return 'linear-gradient(135deg, #f57c00 0%, #ff9800 100%)';
                  if (temp >= 30) return 'linear-gradient(135deg, #388e3c 0%, #4caf50 100%)';
                  return 'linear-gradient(135deg, #1976d2 0%, #2196f3 100%)';
                ]]]
          name:
            - font-size: 11px
            - color: white
            - font-weight: bold
          state:
            - font-size: 24px
            - font-weight: bold
            - color: white
          label:
            - font-size: 9px
            - color: rgba(255,255,255,0.8)
            - margin-top: 2px
          icon:
            - color: white
            - width: 35px
        tap_action:
          action: none

      - type: custom:button-card
        entity: sensor.solar_collector_delta_temperature
        name: Delta (ΔT)
        show_state: true
        show_label: true
        icon: mdi:delta
        label: |
          [[[
            var isSummer = states['input_boolean.solar_collector_summer_mode'].state === 'on';
            var on = parseFloat(isSummer
              ? states['input_number.solar_summer_on_delta'].state
              : states['input_number.solar_winter_on_delta'].state);
            var off = parseFloat(isSummer
              ? states['input_number.solar_summer_off_delta'].state
              : states['input_number.solar_winter_off_delta'].state);
            return `ON:${on}°C OFF:${off}°C`;
          ]]]
        styles:
          card:
            - padding: 15px
            - border-radius: 12px
            - background: |
                [[[
                  var delta = parseFloat(entity.state);
                  var isSummer = states['input_boolean.solar_collector_summer_mode'].state === 'on';
                  var onDelta = parseFloat(isSummer
                    ? states['input_number.solar_summer_on_delta'].state
                    : states['input_number.solar_winter_on_delta'].state);
                  if (delta >= onDelta) return 'linear-gradient(135deg, #388e3c 0%, #66bb6a 100%)';
                  if (delta >= onDelta * 0.7) return 'linear-gradient(135deg, #fbc02d 0%, #fdd835 100%)';
                  if (delta >= 0) return 'linear-gradient(135deg, #0288d1 0%, #03a9f4 100%)';
                  return 'linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%)';
                ]]]
          name:
            - font-size: 11px
            - color: white
            - font-weight: bold
          state:
            - font-size: 24px
            - font-weight: bold
            - color: white
          label:
            - font-size: 9px
            - color: rgba(255,255,255,0.8)
            - margin-top: 2px
          icon:
            - color: white
            - width: 35px
        tap_action:
          action: none

  # CONTROL PANEL
  - type: entities
    title: 🎛️ Control Panel
    show_header_toggle: false
    state_color: true
    card_mod:
      style: |
        ha-card {
          border-radius: 12px;
        }
    entities:
      - entity: input_boolean.solar_system_enabled
        name: System Enabled
        icon: mdi:power
      - entity: input_boolean.solar_manual_control
        name: Manual Control
        icon: mdi:hand-back-right
      - entity: input_boolean.solar_collector_summer_mode
        name: Summer Mode
        icon: mdi:white-balance-sunny
      - entity: switch.solar_collector_wifi_solar_pump
        name: Solar Pump (Temperature Control)
        icon: mdi:pump
      - type: divider
      - entity: input_datetime.solar_last_switch_time
        name: Last Switch Time
        icon: mdi:clock-outline

  # MODE-SPECIFIC SETTINGS
  - type: conditional
    conditions:
      - entity: input_boolean.solar_collector_summer_mode
        state: "on"
    card:
      type: entities
      title: ☀️ Summer Mode Settings
      show_header_toggle: false
      card_mod:
        style: |
          ha-card {
            border-radius: 12px;
            border-left: 4px solid #ff9800;
          }
      entities:
        - type: section
          label: Temperature Thresholds
        - entity: input_number.solar_summer_collector_threshold
          name: Min Collector T to Start
          icon: mdi:thermometer-high
        - entity: input_number.solar_summer_on_delta
          name: ΔT to Turn ON
          icon: mdi:thermometer-plus
        - entity: input_number.solar_summer_off_delta
          name: ΔT to Turn OFF
          icon: mdi:thermometer-minus

  - type: conditional
    conditions:
      - entity: input_boolean.solar_collector_summer_mode
        state: "off"
    card:
      type: entities
      title: ❄️ Winter Mode Settings
      show_header_toggle: false
      card_mod:
        style: |
          ha-card {
            border-radius: 12px;
            border-left: 4px solid #2196f3;
          }
      entities:
        - type: section
          label: Temperature Thresholds
        - entity: input_number.solar_winter_collector_threshold
          name: Min Collector T to Start
          icon: mdi:thermometer-high
        - entity: input_number.solar_winter_on_delta
          name: ΔT to Turn ON
          icon: mdi:thermometer-plus
        - entity: input_number.solar_winter_off_delta
          name: ΔT to Turn OFF
          icon: mdi:thermometer-minus

  # PROTECTION & TIMERS
  - type: entities
    title: 🛡️ Protection & Timers
    show_header_toggle: false
    card_mod:
      style: |
        ha-card {
          border-radius: 12px;
        }
    entities:
      - entity: input_number.solar_max_boiler_temp
        name: Max Boiler Temperature
        icon: mdi:water-boiler-alert
      - entity: input_number.solar_on_delay_minutes
        name: Delay Before Turn ON
        icon: mdi:timer-sand
      - entity: input_number.solar_min_switch_interval_minutes
        name: Min Switch Interval
        icon: mdi:timer-lock

  # SYSTEM INFO
  - type: horizontal-stack
    cards:
      - type: entity
        entity: sensor.solar_collector_wifi_solar_collector_wifi_rssi
        name: Wi-Fi Signal
        icon: mdi:wifi
      - type: entity
        entity: sensor.solar_collector_uptime_human
        name: Uptime
        icon: mdi:timer-outline

  # TEMPERATURE HISTORY
  - type: history-graph
    title: 📈 Temperature History (24h)
    hours_to_show: 24
    refresh_interval: 30
    entities:
      - entity: sensor.solar_collector_temp_clean
        name: Collector
      - entity: sensor.solar_collector_wifi_boiler_temperature
        name: Boiler
      - entity: sensor.sonoff_10021e4b3c_temperature
        name: Radiator
      - entity: sensor.solar_collector_delta_temperature
        name: Delta

  # LOGIC REFERENCE
  - type: markdown
    card_mod:
      style: |
        ha-card {
          border-radius: 12px;
        }
    content: >
      ## 📖 Current Logic

      {% if is_state('input_boolean.solar_collector_summer_mode', 'on') %}
      ### ☀️ SUMMER MODE

      **Pump turns ON when:**
      - Collector ≥ {{ states('input_number.solar_summer_collector_threshold') }}°C
      - ΔT ≥ {{ states('input_number.solar_summer_on_delta') }}°C
      - System enabled & not in manual mode

      **Pump turns OFF when:**
      - ΔT ≤ {{ states('input_number.solar_summer_off_delta') }}°C
      - OR Boiler ≥ {{ states('input_number.solar_max_boiler_temp') }}°C

      {% else %}
      ### ❄️ WINTER MODE

      **Pump turns ON when:**
      - Collector ≥ {{ states('input_number.solar_winter_collector_threshold') }}°C
      - ΔT ≥ {{ states('input_number.solar_winter_on_delta') }}°C
      - System enabled & not in manual mode

      **Pump turns OFF when:**
      - ΔT ≤ {{ states('input_number.solar_winter_off_delta') }}°C
      - OR Boiler ≥ {{ states('input_number.solar_max_boiler_temp') }}°C

      {% endif %}

      **Protection:** Min switch interval {{ states('input_number.solar_min_switch_interval_minutes') }} min
