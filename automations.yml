                | float(30) %} {% set current_soc = states(sensor) | float(0) %} Battery
                SOC ({{ current_soc }}%) is at or below minimum aggressive discharge
                limit ({{ min_soc }}%).

                Mode set to idle to protect battery.'
          - stop: SOC below minimum aggressive discharge threshold
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_notifications_enabled
            state: 'on'
          - condition: state
            entity_id: switch.cew_notify_discharge_aggressive
            state: 'on'
