- id: '1769073713042'
  alias: Update Nordpool Sensor
  description: Force Nordpool sensor to refresh
  triggers:
  - minutes: /10
    trigger: time_pattern
  actions:
  - target:
      entity_id: sensor.nordpool_kwh_lv_eur_3_10_0
    action: homeassistant.update_entity
  mode: single
- id: solar_collector_pump_control
  alias: 'Solar Collector: Pump Control'
  description: Automatic pump control based on temperatures
  triggers:
  - entity_id:
    - sensor.solar_collector_temp_clean
    - sensor.solar_collector_wifi_boiler_temperature
    - sensor.sonoff_10021e4b3c_temperature
    trigger: state
  - entity_id: input_boolean.solar_collector_summer_mode
    trigger: state
  - minutes: /5
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: input_boolean.solar_system_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.solar_manual_control
    state: 'off'
  actions:
  - variables:
      summer_mode: '{{ is_state(''input_boolean.solar_collector_summer_mode'', ''on'')
        }}'
      collector_temp: '{{ states(''sensor.solar_collector_temp_clean'') | float(0)
        }}'
      boiler_temp: '{{ states(''sensor.solar_collector_wifi_boiler_temperature'')
        | float(0) if is_state(''input_boolean.solar_collector_summer_mode'', ''on'')
        else states(''sensor.sonoff_10021e4b3c_temperature'') | float(0) }}'
      delta: '{{ (collector_temp - boiler_temp) | round(2) }}'
      pump_on: '{{ is_state(''switch.solar_collector_wifi_solar_pump'', ''on'') }}'
      on_delta: '{{ states(''input_number.solar_summer_on_delta'') | float(12) if
        is_state(''input_boolean.solar_collector_summer_mode'', ''on'') else states(''input_number.solar_winter_on_delta'')
        | float(3) }}'
      off_delta: '{{ states(''input_number.solar_summer_off_delta'') | float(2) if
        is_state(''input_boolean.solar_collector_summer_mode'', ''on'') else states(''input_number.solar_winter_off_delta'')
        | float(1) }}'
      collector_threshold: '{{ states(''input_number.solar_summer_collector_threshold'')
        | float(45) if is_state(''input_boolean.solar_collector_summer_mode'', ''on'')
        else states(''input_number.solar_winter_collector_threshold'') | float(20)
        }}'
      max_boiler_temp: '{{ states(''input_number.solar_max_boiler_temp'') | float(85)
        }}'
      min_interval_minutes: '{{ states(''input_number.solar_min_switch_interval_minutes'')
        | int(5) }}'
      last_switch: '{{ as_timestamp(states(''input_datetime.solar_last_switch_time''))
        | float(0) }}'
  - data:
      message: 'Solar: Mode={{ ''Summer'' if summer_mode else ''Winter'' }}, T_col={{
        collector_temp }}°C, T_boil={{ boiler_temp }}°C, ΔT={{ delta }}°C, Pump={{
        pump_on }}, Thresholds: on={{ on_delta }}, off={{ off_delta }}, col={{ collector_threshold
        }}'
      level: info
    action: system_log.write
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not pump_on }}'
      - condition: template
        value_template: '{{ (((as_timestamp(now()) - last_switch) / 60) | int) >=
          min_interval_minutes or last_switch == 0 }}'
      - condition: template
        value_template: '{{ collector_temp >= collector_threshold }}'
      - condition: template
        value_template: '{{ delta >= on_delta }}'
      - condition: template
        value_template: '{{ boiler_temp < max_boiler_temp }}'
      sequence:
      - target:
          entity_id: switch.solar_collector_wifi_solar_pump
        action: switch.turn_on
      - target:
          entity_id: input_datetime.solar_last_switch_time
        data:
          datetime: '{{ now().isoformat() }}'
        action: input_datetime.set_datetime
      - target:
          entity_id: counter.solar_pump_on_counter
        action: counter.increment
      - data:
          title: ☀️ Solar Collector
          message: Pump ON ({{ 'Summer' if summer_mode else 'Winter' }} mode) ΔT =
            {{ delta }}°C (threshold {{ on_delta }}°C) Collector = {{ collector_temp
            }}°C Boiler = {{ boiler_temp }}°C
        action: persistent_notification.create
    - conditions:
      - condition: template
        value_template: '{{ pump_on }}'
      - condition: template
        value_template: '{{ (((as_timestamp(now()) - last_switch) / 60) | int) >=
          min_interval_minutes or last_switch == 0 }}'
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ delta <= off_delta }}'
        - condition: template
          value_template: '{{ boiler_temp >= max_boiler_temp }}'
      sequence:
      - target:
          entity_id: switch.solar_collector_wifi_solar_pump
        action: switch.turn_off
      - target:
          entity_id: input_datetime.solar_last_switch_time
        data:
          datetime: '{{ now().isoformat() }}'
        action: input_datetime.set_datetime
      - data:
          title: ☀️ Solar Collector
          message: Pump OFF ({{ 'Summer' if summer_mode else 'Winter' }} mode) ΔT
            = {{ delta }}°C (threshold {{ off_delta }}°C) Collector = {{ collector_temp
            }}°C Boiler = {{ boiler_temp }}°C{% if boiler_temp >= max_boiler_temp
            %} (Max temperature reached){% endif %}
        action: persistent_notification.create
  mode: single
- id: solar_manual_control_on
  alias: 'Solar Collector: Manual Control ON'
  trigger:
  - platform: state
    entity_id: input_boolean.solar_manual_control
    to: 'on'
  action:
  - service: persistent_notification.create
    data:
      title: ☀️ Solar Collector
      message: Manual control enabled. Automation disabled.
- id: solar_counter_reset
  alias: 'Solar Collector: Counter Reset'
  trigger:
  - platform: time
    at: 00:00:00
  action:
  - service: counter.reset
    target:
      entity_id: counter.solar_pump_on_counter
- id: solar_mode_change
  alias: 'Solar Collector: Mode Change'
  trigger:
  - platform: state
    entity_id: input_boolean.solar_collector_summer_mode
  action:
  - service: persistent_notification.create
    data:
      title: ☀️ Solar Collector
      message: 'Mode: {{ ''SUMMER ☀️'' if is_state(''input_boolean.solar_collector_summer_mode'',
        ''on'') else ''WINTER ❄️'' }} New thresholds: ΔT ON: {{ states(''input_number.solar_summer_on_delta''
        if is_state(''input_boolean.solar_collector_summer_mode'', ''on'') else ''input_number.solar_winter_on_delta'')
        }}°C ΔT OFF: {{ states(''input_number.solar_summer_off_delta'' if is_state(''input_boolean.solar_collector_summer_mode'',
        ''on'') else ''input_number.solar_winter_off_delta'') }}°C

        '
- id: solar_overheat_protection
  alias: 'Solar Collector: Overheat Protection'
  trigger:
  - platform: numeric_state
    entity_id:
    - sensor.solar_collector_wifi_boiler_temperature
    - sensor.sonoff_10021e4b3c_temperature
    above: 90
  condition:
  - condition: state
    entity_id: switch.solar_collector_wifi_solar_pump
    state: 'on'
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.solar_collector_wifi_solar_pump
  - service: persistent_notification.create
    data:
      title: ⚠️ SOLAR COLLECTOR ALERT
      message: 'EMERGENCY SHUTDOWN! Temperature reached {{ trigger.to_state.state
        }}°C Pump automatically turned off.

        '
- id: '1769433708146'
