        default: []
    - conditions:
      - condition: trigger
        id: idle_start
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_notifications_enabled
            state: 'on'
          - condition: state
            entity_id: switch.cew_notify_idle
            state: 'on'
          - condition: or
            conditions:
            - condition: state
              entity_id: switch.cew_quiet_hours_enabled
              state: 'off'
            - condition: template
              value_template: '{% set now_time = now().strftime(''%H:%M'') %} {% set
                quiet_start = states(''time.cew_quiet_hours_start'') %} {% set quiet_end
                = states(''time.cew_quiet_hours_end'') %} {{ now_time < quiet_start
                or now_time >= quiet_end }}'
          sequence:
          - service: notify.notify
            data:
              title: '💤 CEW: Normal/idle Mode Started'
              message: 'Current price: €{{ state_attr(''sensor.cew_today'', ''current_price'')
                | float(0) | round(5) }}/kWh

                Spread: {{ state_attr(''sensor.cew_today'', ''spread_avg'') | float(0)
                | round(1) }}%'
        default: []
      - choose:
        - conditions:
          - condition: template
            value_template: '{% set entity = states(''text.cew_battery_idle_action'')
              %} {{ entity != ''not_configured'' and entity != ''unknown'' and entity
              != '''' }}'
          sequence:
          - service: "{% if states('text.cew_battery_idle_action').startswith('automation.')\
              \ %}\n  automation.trigger\n{% elif states('text.cew_battery_idle_action').startswith('script.')\
              \ %}\n  script.turn_on\n{% elif states('text.cew_battery_idle_action').startswith('scene.')\
              \ %}\n  scene.turn_on\n{% endif %}\n"
            target:
              entity_id: '{{ states(''text.cew_battery_idle_action'') }}'
        default: []
    - conditions:
      - condition: trigger
        id: off_start
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_notifications_enabled
            state: 'on'
          - condition: state
            entity_id: switch.cew_notify_off
            state: 'on'
          - condition: or
            conditions:
            - condition: state
              entity_id: switch.cew_quiet_hours_enabled
              state: 'off'
            - condition: template
              value_template: '{% set now_time = now().strftime(''%H:%M'') %} {% set
                quiet_start = states(''time.cew_quiet_hours_start'') %} {% set quiet_end
                = states(''time.cew_quiet_hours_end'') %} {{ now_time < quiet_start
                or now_time >= quiet_end }}'
          sequence:
          - service: notify.notify
            data:
              title: '🔌 CEW: Battery Off'
              message: Battery operations suspended.
        default: []
      - choose:
        - conditions:
          - condition: template
            value_template: '{% set entity = states(''text.cew_battery_off_action'')
              %} {{ entity != ''not_configured'' and entity != ''unknown'' and entity
              != '''' }}'
          sequence:
          - service: "{% if states('text.cew_battery_off_action').startswith('automation.')\
              \ %}\n  automation.trigger\n{% elif states('text.cew_battery_off_action').startswith('script.')\
              \ %}\n  script.turn_on\n{% elif states('text.cew_battery_off_action').startswith('scene.')\
              \ %}\n  scene.turn_on\n{% endif %}\n"
            target:
              entity_id: '{{ states(''text.cew_battery_off_action'') }}'
        default: []
    - conditions:
      - condition: trigger
        id: automation_disabled
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_notifications_enabled
            state: 'on'
          - condition: state
            entity_id: switch.cew_notify_automation_disabled
            state: 'on'
          - condition: or
            conditions:
            - condition: state
              entity_id: switch.cew_quiet_hours_enabled
              state: 'off'
            - condition: template
              value_template: '{% set now_time = now().strftime(''%H:%M'') %} {% set
                quiet_start = states(''time.cew_quiet_hours_start'') %} {% set quiet_end
                = states(''time.cew_quiet_hours_end'') %} {{ now_time < quiet_start
                or now_time >= quiet_end }}'
          sequence:
          - service: notify.notify
            data:
              title: '⛔ CEW: Automation Disabled'
              message: CEW automation has been turned off.
        default: []
    - conditions:
      - condition: trigger
        id: midnight_rotation
      - condition: state
        entity_id: switch.cew_tomorrow_settings_enabled
        state: 'on'
      sequence:
      - service: cheapest_energy_windows.rotate_tomorrow_settings
        data: {}
      - delay:
          seconds: 2
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.cew_today
      - service: switch.turn_off
        target:
          entity_id: switch.cew_tomorrow_settings_enabled
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_notifications_enabled
            state: 'on'
          - condition: state
            entity_id: switch.cew_midnight_rotation_notifications
            state: 'on'
          - condition: or
            conditions:
            - condition: state
              entity_id: switch.cew_quiet_hours_enabled
              state: 'off'
            - condition: template
              value_template: "{% set now = now().strftime('%H:%M') %} {% set quiet_start\
                \ = states('time.cew_quiet_hours_start') %} {% set quiet_end = states('time.cew_quiet_hours_end')\
                \ %} {% if quiet_start < quiet_end %}\n  {{ now < quiet_start or now\
                \ >= quiet_end }}\n{% else %}\n  {{ now < quiet_start and now >= quiet_end\
                \ }}\n{% endif %}"
          sequence:
          - service: notify.notify
            data:
              title: '🔄 CEW: Settings Rotated'
              message: Tomorrow's settings have been applied to today
        default: []
    default: []
  id: cheapest_energy_windows_notifications
- id: water_pump_switch_counter
  alias: 'Water Pump: Count Switches'
  description: Count water pump on/off switches
  triggers:
  - entity_id: sensor.water_pump_status
    trigger: state
    to: 'on'
  actions:
  - target:
      entity_id: counter.water_pump_switch_counter
    action: counter.increment
  mode: single
- id: water_pump_counter_reset
  alias: 'Water Pump: Reset Daily Counter'
  description: Reset water pump counter at midnight
  triggers:
  - at: 00:00:00
    trigger: time
  actions:
  - target:
      entity_id: counter.water_pump_switch_counter
    action: counter.reset
  mode: single
- id: frigate_person_detected_telegram
  alias: 'Frigate: Person Detected Notification'
  description: Send Telegram notification when person is detected
  triggers:
  - platform: event
    event_type: frigate_event
    event_data:
      type: new
      label: person
  actions:
  - service: notify.sarai_oleg_matveev_1434630975
    data:
      message: '🚨 Person detected: {{ trigger.event.data.camera }} at {{ now().strftime("%H:%M:%S") }}'
      data:
        photo:
        - url: 'http://192.168.192.4:8123/api/frigate/notifications/{{ trigger.event.data.id }}/thumbnail.jpg'
          caption: 'Person detected on {{ trigger.event.data.camera }}'
  mode: single
