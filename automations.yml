- id: '1769433745580'
  alias: CEW Battery Charge Stop
  description: ''
  triggers:
  - entity_id: input_boolean.cew_charge_trigger
    to: 'off'
    trigger: state
  actions:
  - target:
      entity_id: switch.sonoff_ab300012ee_1
    action: switch.turn_off
  mode: single
- alias: CEW - Battery Control (Auto-Managed - DO NOT EDIT OR DELETE)
  description: Control your home battery based on Cheapest Energy Windows calculations
  mode: queued
  max: 10
  trigger:
  - platform: state
    entity_id: switch.cew_automation_enabled
    to: 'off'
    id: automation_disabled
  - platform: state
    entity_id: sensor.cew_today
    to: charge
    from:
    - discharge
    - discharge_aggressive
    - idle
    - 'off'
    id: charge_start
  - platform: state
    entity_id: sensor.cew_today
    to: discharge
    from:
    - charge
    - discharge_aggressive
    - idle
    - 'off'
    id: discharge_start
  - platform: state
    entity_id: sensor.cew_today
    to: discharge_aggressive
    from:
    - charge
    - discharge
    - idle
    - 'off'
    id: discharge_aggressive_start
  - platform: state
    entity_id: sensor.cew_today
    to: idle
    from:
    - charge
    - discharge
    - discharge_aggressive
    - 'off'
    id: idle_start
  - platform: state
    entity_id: sensor.cew_today
    to: 'off'
    from:
    - charge
    - discharge
    - discharge_aggressive
    - idle
    id: off_start
  - platform: time
    at: 00:00:10
    id: midnight_rotation
  condition:
  - condition: or
    conditions:
    - condition: trigger
      id: midnight_rotation
    - condition: template
      value_template: '{{ trigger.from_state.state != ''unavailable'' }}'
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: charge_start
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_notifications_enabled
            state: 'on'
          - condition: state
            entity_id: switch.cew_notify_charging
            state: 'on'
          - condition: or
            conditions:
            - condition: state
              entity_id: switch.cew_quiet_hours_enabled
              state: 'off'
            - condition: template
              value_template: '{% set now_time = now().strftime(''%H:%M'') %} {% set
                quiet_start = states(''time.cew_quiet_hours_start'') %} {% set quiet_end
                = states(''time.cew_quiet_hours_end'') %} {{ now_time < quiet_start
                or now_time >= quiet_end }}'
          sequence:
          - service: notify.notify
            data:
              title: '🔋 CEW: Charging Mode Started'
              message: 'Current price: €{{ state_attr(''sensor.cew_today'', ''current_price'')
                | float(0) | round(5) }}/kWh

                Avg cheap price: €{{ state_attr(''sensor.cew_today'', ''avg_cheap_price'')
                | float(0) | round(5) }}/kWh

                Charge power: {{ states(''number.cew_charge_power'') }}W

                Spread: {{ state_attr(''sensor.cew_today'', ''spread_avg'') | float(0)
                | round(1) }}%'
        default: []
      - choose:
        - conditions:
          - condition: template
            value_template: '{% set entity = states(''text.cew_battery_charge_action'')
              %} {{ entity != ''not_configured'' and entity != ''unknown'' and entity
              != '''' }}'
          sequence:
          - service: "{% if states('text.cew_battery_charge_action').startswith('automation.')\
              \ %}\n  automation.trigger\n{% elif states('text.cew_battery_charge_action').startswith('script.')\
              \ %}\n  script.turn_on\n{% elif states('text.cew_battery_charge_action').startswith('scene.')\
              \ %}\n  scene.turn_on\n{% endif %}\n"
            target:
              entity_id: '{{ states(''text.cew_battery_charge_action'') }}'
        default: []
    - conditions:
      - condition: trigger
        id: discharge_start
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_battery_use_soc_safety
            state: 'on'
          - condition: state
            entity_id: text.cew_battery_soc_sensor
            state: not_configured
          sequence:
          - condition: and
            conditions:
            - condition: state
              entity_id: switch.cew_notifications_enabled
              state: 'on'
            - condition: or
              conditions:
              - condition: state
                entity_id: switch.cew_quiet_hours_enabled
                state: 'off'
              - condition: template
                value_template: '{% set now_time = now().strftime(''%H:%M'') %} {%
                  set quiet_start = states(''time.cew_quiet_hours_start'') %} {% set
                  quiet_end = states(''time.cew_quiet_hours_end'') %} {{ now_time
                  < quiet_start or now_time >= quiet_end }}'
          - service: notify.notify
            data:
              title: '⚠️ CEW: SOC Safety Misconfigured'
              message: 'Battery SOC Safety is enabled but battery sensor is not configured.

                Please configure the battery SOC sensor in Settings or disable SOC
                Safety.'
          - stop: SOC safety enabled but sensor not configured
        - conditions:
          - condition: state
            entity_id: switch.cew_battery_use_soc_safety
            state: 'on'
          - condition: template
            value_template: '{% set sensor = states(''text.cew_battery_soc_sensor'')
              %} {% set min_soc = states(''number.cew_battery_min_soc_discharge'')
              | float(20) %} {% set current_soc = states(sensor) | float(-1) %} {{
              sensor != ''not_configured'' and current_soc >= 0 and current_soc <=
              min_soc }}'
          sequence:
          - service: input_text.set_value
            target:
              entity_id: input_text.cew_current_mode
            data:
              value: idle
          - condition: and
            conditions:
            - condition: state
              entity_id: switch.cew_notifications_enabled
              state: 'on'
            - condition: or
              conditions:
              - condition: state
                entity_id: switch.cew_quiet_hours_enabled
                state: 'off'
              - condition: template
                value_template: '{% set now_time = now().strftime(''%H:%M'') %} {%
                  set quiet_start = states(''time.cew_quiet_hours_start'') %} {% set
                  quiet_end = states(''time.cew_quiet_hours_end'') %} {{ now_time
                  < quiet_start or now_time >= quiet_end }}'
          - service: notify.notify
            data:
              title: '🔋 CEW: Discharge Blocked by SOC Safety'
              message: '{% set sensor = states(''text.cew_battery_soc_sensor'') %}
                {% set min_soc = states(''number.cew_battery_min_soc_discharge'')
                | float(20) %} {% set current_soc = states(sensor) | float(0) %} Battery
                SOC ({{ current_soc }}%) is at or below minimum discharge limit ({{
                min_soc }}%).

                Mode set to idle to protect battery.'
          - stop: SOC below minimum discharge threshold
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_notifications_enabled
            state: 'on'
          - condition: state
            entity_id: switch.cew_notify_discharge
            state: 'on'
          - condition: or
            conditions:
            - condition: state
              entity_id: switch.cew_quiet_hours_enabled
              state: 'off'
            - condition: template
              value_template: '{% set now_time = now().strftime(''%H:%M'') %} {% set
                quiet_start = states(''time.cew_quiet_hours_start'') %} {% set quiet_end
                = states(''time.cew_quiet_hours_end'') %} {{ now_time < quiet_start
                or now_time >= quiet_end }}'
          sequence:
          - service: notify.notify
            data:
              title: '⚡ CEW: Discharge Mode Started'
              message: 'Current price: €{{ state_attr(''sensor.cew_today'', ''current_price'')
                | float(0) | round(5) }}/kWh

                Avg expensive price: €{{ state_attr(''sensor.cew_today'', ''avg_expensive_price'')
                | float(0) | round(5) }}/kWh

                Discharge power: {{ states(''number.cew_discharge_power'') }}W

                Spread: {{ state_attr(''sensor.cew_today'', ''spread_avg'') | float(0)
                | round(1) }}%'
        default: []
      - choose:
        - conditions:
          - condition: template
            value_template: '{% set entity = states(''text.cew_battery_discharge_action'')
              %} {{ entity != ''not_configured'' and entity != ''unknown'' and entity
              != '''' }}'
          sequence:
          - service: "{% if states('text.cew_battery_discharge_action').startswith('automation.')\
              \ %}\n  automation.trigger\n{% elif states('text.cew_battery_discharge_action').startswith('script.')\
              \ %}\n  script.turn_on\n{% elif states('text.cew_battery_discharge_action').startswith('scene.')\
              \ %}\n  scene.turn_on\n{% endif %}\n"
            target:
              entity_id: '{{ states(''text.cew_battery_discharge_action'') }}'
        default: []
    - conditions:
      - condition: trigger
        id: discharge_aggressive_start
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: switch.cew_battery_use_soc_safety
            state: 'on'
          - condition: state
            entity_id: text.cew_battery_soc_sensor
            state: not_configured
          sequence:
          - condition: and
            conditions:
            - condition: state
              entity_id: switch.cew_notifications_enabled
              state: 'on'
            - condition: or
              conditions:
              - condition: state
                entity_id: switch.cew_quiet_hours_enabled
                state: 'off'
              - condition: template
                value_template: '{% set now_time = now().strftime(''%H:%M'') %} {%
                  set quiet_start = states(''time.cew_quiet_hours_start'') %} {% set
                  quiet_end = states(''time.cew_quiet_hours_end'') %} {{ now_time
                  < quiet_start or now_time >= quiet_end }}'
          - service: notify.notify
            data:
              title: '⚠️ CEW: SOC Safety Misconfigured'
              message: 'Battery SOC Safety is enabled but battery sensor is not configured.

                Please configure the battery SOC sensor in Settings or disable SOC
                Safety.'
          - stop: SOC safety enabled but sensor not configured
        - conditions:
          - condition: state
            entity_id: switch.cew_battery_use_soc_safety
            state: 'on'
          - condition: template
            value_template: '{% set sensor = states(''text.cew_battery_soc_sensor'')
              %} {% set min_soc = states(''number.cew_battery_min_soc_aggressive_discharge'')
              | float(30) %} {% set current_soc = states(sensor) | float(-1) %} {{
              sensor != ''not_configured'' and current_soc >= 0 and current_soc <=
              min_soc }}'
          sequence:
          - service: input_text.set_value
            target:
              entity_id: input_text.cew_current_mode
            data:
              value: idle
          - condition: and
            conditions:
            - condition: state
              entity_id: switch.cew_notifications_enabled
              state: 'on'
            - condition: or
              conditions:
              - condition: state
                entity_id: switch.cew_quiet_hours_enabled
                state: 'off'
              - condition: template
                value_template: '{% set now_time = now().strftime(''%H:%M'') %} {%
                  set quiet_start = states(''time.cew_quiet_hours_start'') %} {% set
                  quiet_end = states(''time.cew_quiet_hours_end'') %} {{ now_time
                  < quiet_start or now_time >= quiet_end }}'
          - service: notify.notify
            data:
              title: '🔋 CEW: Aggressive Discharge Blocked by SOC Safety'
              message: '{% set sensor = states(''text.cew_battery_soc_sensor'') %}
